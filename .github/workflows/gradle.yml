# https://docs.github.com/en/actions/how-tos/use-cases-and-examples/building-and-testing/building-and-testing-java-with-gradle
name: Gradle CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [ '25', '26' ]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
      - name: Build with Gradle
        run: ./gradlew --no-daemon verify
      - name: Analyze with SonarCloud
        if: ${{ matrix.java-version == '25' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon sonar

  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1.5.6
        with:
          java-version: '25'
          distribution: 'graalvm-community'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
      - name: Build native image with Gradle
        run: ./gradlew --no-daemon nativeCompile
      - name: Upload native image
        uses: actions/upload-artifact@v7
        with:
          name: monte-carlo-method-gradle-native
          path: build/native/nativeCompile/monte-carlo-method
